<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <style>
            body {
                height: calc(100vh - 16px);
                display: grid;
                align-items: center;
                justify-content: center;
            }

            #header {
                margin-bottom: -1.25rem;
            }

            #intro {
                display: flex;
                flex-direction: column;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div id="intro">
            <img src="/static/pinhead.jpg">
            {{if eq (placeholder http.request.uri.query.proxy) "true"}}
                <h1 id="header">{{placeholder "http.reverse_proxy.status_code"}}</h1>
                <h2>{{placeholder "http.reverse_proxy.status_text"}}</h2>
            {{else}}
                <h1 id="header">{{placeholder "http.error.status_code"}}</h1>
                <h2>{{placeholder "http.error.status_text"}}</h2>
            {{end}}
        </div>
    </body>
</html>
