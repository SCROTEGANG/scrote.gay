<!DOCTYPE html>
<html>

        <style>

                list-style: none;

                text-transform: capitalize;
            }

            body {
                height: calc(100vh - 16px);
                display: grid;
                align-items: center;
                justify-content: center;
            }
        </style>
    </head>
    <body>
        <article id="shit">
            {{range $file := listFiles "/shit/"}}
            <h1>SCROTEDOCS</h1>
            <ul>
                {{$pretty := trimSuffix ".md" $file }}
                <li>
                    <a href="{{$pretty}}">{{$pretty}}</a>
                </li>
            </ul>
            {{end}}
        </article>
    </body>
</html>
