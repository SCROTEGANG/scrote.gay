<!DOCTYPE html>
<html>
    <head>
        <title>Shit!!!!!!!</title>

        <style>
            #shit {
                list-style: none;
            }

            #shit>a {
                font-size: 1.25rem;
            }
        </style>
    </head>
    <body>
        <article id="shit">
            {{range $file := listFiles "/shit/"}}
            <ul>
                {{$pretty := stripSuffix ".md" $file }}
                <li>
                    <a href="{{$pretty}}">{{$pretty}}</a>
                </li>
            </ul>
            {{end}}
        </article>
    </body>
</html>
